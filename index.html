<!DOCTYPE html>
<html>

<head>

<title>CodeAlpha AI Chatbot</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:400px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.chat-box{
height:400px;
overflow-y:auto;
padding:10px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#DCF8C6;
align-self:flex-end;
}

.bot{
background:#eee;
align-self:flex-start;
}

.input-box{
display:flex;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
padding:10px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
CodeAlpha AI Chatbot
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-box">

<input id="msg" placeholder="Type message...">

<button onclick="send()">Send</button>

</div>

</div>

<script>

function addMessage(text,type){

let chatBox=document.getElementById("chatBox")

let message=document.createElement("div")

message.classList.add("message",type)

message.innerText=text

chatBox.appendChild(message)

chatBox.scrollTop=chatBox.scrollHeight

}

function send(){

let input=document.getElementById("msg")

let message=input.value

if(message=="") return

addMessage(message,"user")

input.value=""

fetch("/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:message})

})

.then(res=>res.json())

.then(data=>{

setTimeout(()=>{

addMessage(data.reply,"bot")

},700)

})

}

</script>

</body>

</html>
